spring:
  application:
    name: finance-control-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/finance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  security:
    api-key: ${API_KEY:aXRhw7o=}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${APP_PORT:8080}