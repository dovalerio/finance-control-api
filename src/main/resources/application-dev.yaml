spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/finance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.heitor.finance: DEBUG
    org.hibernate.SQL: DEBUG