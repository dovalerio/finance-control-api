spring:
  devtools:
    restart:
      enabled: true
      poll-interval: 2s   # intervalo para verificar mudanças no classpath
      quiet-period: 1s    # aguarda 1s sem mudanças antes de reiniciar
    livereload:
      enabled: true       # servidor LiveReload na porta 35729 (opcional para frontends)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/finance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false      # SQL controlado pelo Log4j2 via org.hibernate.SQL logger
    properties:
      hibernate:
        format_sql: true
        highlight_sql: false  # desabilita ANSI no SQL para acessibilidade