openapi: 3.0.3

info:
  title: Finance Control API
  version: 1.0.0

servers:
  - url: http://localhost:8080/v1

security:
  - ApiKeyAuth: []

paths:

  /categories:
    get:
      summary: List categories
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

    post:
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /categories/{id}:
    get:
      summary: Get category by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

    put:
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

    delete:
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted

  /subcategories:
    get:
      summary: List subcategories
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Subcategory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subcategory'

    post:
      summary: Create subcategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubcategoryRequest'
      responses:
        '201':
          description: Subcategory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subcategory'

  /subcategories/{id}:
    get:
      summary: Get subcategory by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Subcategory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subcategory'

    put:
      summary: Update subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubcategoryRequest'
      responses:
        '200':
          description: Subcategory updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subcategory'

    delete:
      summary: Delete subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Subcategory deleted

  /entries:
    get:
      summary: List entries
      parameters:
        - name: subcategoryId
          in: query
          required: false
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entry'

    post:
      summary: Create entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'

  /entries/{id}:
    get:
      summary: Get entry by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'

    put:
      summary: Update entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'

    delete:
      summary: Delete entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Entry deleted

  /balance:
    get:
      summary: Calculate balance
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Balance result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key

  schemas:

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    Subcategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: integer

    CreateSubcategoryRequest:
      type: object
      required:
        - name
        - categoryId
      properties:
        name:
          type: string
        categoryId:
          type: integer

    Entry:
      type: object
      properties:
        id:
          type: integer
        value:
          type: number
        date:
          type: string
          format: date
        subcategoryId:
          type: integer
        comment:
          type: string

    CreateEntryRequest:
      type: object
      required:
        - value
        - subcategoryId
      properties:
        value:
          type: number
        date:
          type: string
          format: date
        subcategoryId:
          type: integer
        comment:
          type: string

    Balance:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        revenue:
          type: number
        expense:
          type: number
        balance:
          type: number